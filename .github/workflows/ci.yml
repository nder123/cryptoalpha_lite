name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true

      - name: Install deps
        run: |
          poetry install --with dev

      - name: Ruff
        run: |
          poetry run ruff check app/services/rl_*.py scripts/rl_promotion_recommender.py scripts/rl_status.py scripts/rl_snapshots_collect.py scripts/rl_snapshots_report.py scripts/rl_baseline_watchdog.py scripts/rl_baseline_helper.py

      - name: Black (check)
        run: |
          poetry run black --check app/services/rl_*.py scripts/rl_promotion_recommender.py scripts/rl_status.py scripts/rl_snapshots_collect.py scripts/rl_snapshots_report.py scripts/rl_baseline_watchdog.py scripts/rl_baseline_helper.py

      - name: Isort (check)
        run: |
          poetry run isort --check-only app/services/rl_*.py scripts/rl_promotion_recommender.py scripts/rl_status.py scripts/rl_snapshots_collect.py scripts/rl_snapshots_report.py scripts/rl_baseline_watchdog.py scripts/rl_baseline_helper.py

      - name: Bandit
        run: |
          poetry run bandit -q -s B101,B112,B310,B404,B603,B607 app/services/rl_*.py scripts/rl_promotion_recommender.py scripts/rl_status.py scripts/rl_snapshots_collect.py scripts/rl_snapshots_report.py scripts/rl_baseline_watchdog.py scripts/rl_baseline_helper.py

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Install deps
        run: |
          poetry install --with dev

      - name: Import checks
        env:
          PYTHONPATH: .
        run: |
          poetry run python -c "import app.services.execution_engine"
          poetry run python -c "from app.services.validation.cross_module_consistency import check_risk_coverage, check_event_bus_coverage, check_lineage_coverage; print('validation imports OK')"

      - name: Pytest (validation + non-legacy unit surface)
        env:
          PYTHONPATH: .
        run: |
          poetry run pytest -q --maxfail=1 --disable-warnings \
            tests/test_cross_module_consistency.py \
            tests/test_full_cycle.py \
            tests/test_notification_dispatcher.py \
            tests/test_gate_c_invariants_light.py \
            tests/test_event_lineage_consistency.py \
            tests/test_watchdog_states.py \
            tests/test_watchdog_evidence.py \
            tests/test_watchdog_recovery.py
