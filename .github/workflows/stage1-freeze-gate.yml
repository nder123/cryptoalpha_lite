name: stage1-freeze-gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  freeze-gate:
    name: Stage 1 Freeze Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          pipx install poetry==1.8.3 || pip install --user poetry==1.8.3

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install backend deps
        working-directory: backend
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-root --only=main,dev || poetry install --no-interaction --no-root

      - name: Freeze guard structural verify
        id: freeze
        working-directory: backend
        run: |
          set -euo pipefail
          poetry run python -m runtime.freeze_guard verify --json | tee freeze_report.json
          poetry run python -m runtime.freeze_guard verify

      - name: Stage 1 test surface
        working-directory: backend
        run: |
          poetry run pytest \
            tests/test_freeze_guard.py \
            tests/test_stress_harness.py \
            tests/test_watchdog_states.py \
            tests/test_watchdog_aggregator.py \
            tests/test_watchdog_recovery.py \
            tests/test_watchdog_evidence.py \
            tests/test_safe_mode_enforcement.py \
            tests/test_safe_mode_integration.py \
            tests/test_retention.py \
            tests/test_chaos_drills.py \
            tests/test_timeline.py \
            -q --tb=short

      - name: Upload freeze report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage1-freeze-report
          path: backend/freeze_report.json
          retention-days: 30
