name: stage1-freeze-gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  freeze-gate:
    name: Stage 1 Freeze Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          pipx install poetry==1.8.3 || pip install --user poetry==1.8.3

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install backend deps
        working-directory: backend
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-root --only=main,dev || poetry install --no-interaction --no-root

      - name: Freeze guard stub smoke
        id: freeze
        working-directory: backend
        run: |
          set -euo pipefail
          poetry run python - <<'PY' | tee freeze_report.json
          import json
          from runtime.freeze_guard.checker import check

          ok = check() is True
          print(json.dumps({"schema": "stage1_freeze_report.stub.v1", "passed": ok}))
          raise SystemExit(0 if ok else 1)
          PY

      - name: Stage 1 stub-aware test surface
        working-directory: backend
        run: |
          poetry run python -c "import app.services.execution_engine"
          poetry run pytest \
            tests/test_watchdog_states.py \
            tests/test_watchdog_recovery.py \
            tests/test_watchdog_evidence.py \
            -q --tb=short

      - name: Upload freeze report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage1-freeze-report
          path: backend/freeze_report.json
          retention-days: 30
