repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/.*\.py$

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^backend/.*\.py$

  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.11
        files: ^backend/.*\.py$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-q", "-r", "backend/app", "backend/scripts", "-s", "B101,B104,B108,B110,B112,B310,B404,B603,B607"]
        pass_filenames: false

exclude: |
  (?x)(
    backend/\.uvicorn\.log
    |backend/rl_status_snapshots\.jsonl
    |backend/\.pytest_cache/.*
    |backend/\.promotion_recommender_state\.json
    |backend/\.codex_out/.*
    |backend/logs/.*
    |backend/.*\.pid
    |frontend/tsconfig\.tsbuildinfo
    |frontend/\.vite\.(log|pid)
    |frontend/dist/.*
  )
